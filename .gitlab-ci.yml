stages:
  - setup
  - build
  - push

default:
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind

setup:
  stage: setup
  # rules:
  # - if: $CI_COMMIT_TAG && $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
  tags:
    - docker-builder
  script:
    - apk add --no-cache curl jq
    - apt-get update && apt-get -y install curl
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - |
      curl --request GET -H "JOB-TOKEN: $CI_JOB_TOKEN" https://gitlab.liftedinit.org/api/v4/projects/$CI_PROJECT_ID/secure_files > secure_files.json
      cat secure_files.json
      cat secure_files.json | jq -r '.[] | "\(.id),\(.name)"' > files.txt
      while IFS=, read -r id name; do
          curl --request GET --header "JOB-TOKEN: $CI_JOB_TOKEN" https://gitlab.liftedinit.org/api/v4/projects/$CI_PROJECT_ID/secure_files/$id/download > $name
      done < files.txt
    - ls -la

build:
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    DOCKER_CLIENT_TIMEOUT: 600
    COMPOSE_HTTP_TIMEOUT: 600
  # only:
  #   - tags
  # rules:
  # - if: $CI_COMMIT_TAG && $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
  tags:
    - docker-builder
  script:
    - export ARTIFACT_NAME="$CI_REGISTRY_IMAGE:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - docker build -t ${ARTIFACT_NAME} .
    # - docker push  ${ARTIFACT_NAME}

    # Docker login for another user with a personal access token and push to docker hub
    - docker login -u $DOCKER_HUB_USER --password $DOCKER_HUB_PASSWORD
    - docker tag ${ARTIFACT_NAME} $DOCKER_HUB_USER/${ARTIFACT_NAME}
    - docker push $DOCKER_HUB_USER/${ARTIFACT_NAME}
